networks:
  ecommerce-network:
    driver: bridge

services:
  order-db:
    # 1. Changed service key to match depends_on
    image: postgres:15-alpine
    container_name: order-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432" # 2. Crucial: Map to 5433 if catalog-db is already using 5432 on your laptop!
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  order-service:
    # 3. Changed service key to order-service
    container_name: ecommerce-order
    build: .
    ports:
      - "3002:3002"
    env_file:
      - ./.env
    environment:
      - DB_HOST=order-db # 4. Correctly points to the service key above
    depends_on:
      - order-db
    networks:
      - ecommerce-network
    restart: always

volumes:
  order-db-data:
