syntax = "proto3";

package auth;

service UserService {
    rpc registerUser(CreateUserDto) returns (User);
    rpc getAllUsers(Empty) returns (Users);
    rpc getUserById(GetUserByIdDto) returns (User);
    rpc login(LoginUserDto) returns (LoginResponse);
    rpc logout(LogoutUserDto) returns (Empty);
    rpc refreshToken(RefreshTokenDto) returns (RefreshTokenResponse);
    rpc updateUser(UpdateUserDto) returns (User);
    rpc deleteUser(DeleteUserDto) returns (Empty);
  
}

message RefreshTokenDto {
    string refreshToken = 1;
}

message RefreshTokenResponse {
    string token = 1;
    string refreshToken = 2;
}

message User {
    int64 id = 1;
    string email = 2;
    string password = 3;
    string firstName = 4;
    string lastName = 5;
}

message LoginResponse {
    string token = 1;
    string refreshToken = 2;
  
}
message Users {
    repeated User users = 1;
  
}
message GetUserByIdDto {
    int64 id = 1;
}
message Empty {}

message  CreateUserDto {
    string email =1 ;
    string password =2 ;
    string firstName = 3;
    string lastName = 4;
}

message  LoginUserDto {
    string email =1 ;
    string password =2 ;
  
}

message LogoutUserDto {
    int64 id = 1;
    int64 userId = 2;
}

message DeleteUserDto {
    int64 id = 1;
    int64 userId = 2;
}

message  UpdateUserDto {
    int64 id = 1;
    string email =2 ;
    string password =3 ;
    string firstName = 4;
    string lastName = 5;
}



